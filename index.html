<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tempo Rhythem Project</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="tempo-shell">
    <section class="panel settings-panel">
      <div class="brand">
        <span class="brand-tag">TEMPO RHYTHEM</span>
        <h1>Tempo Rhythem Project</h1>
        <p>Set the rhythm, choose the bass tone, and let the beat evolve every minute.</p>
      </div>

      <div class="form-grid">
        <label class="field-group">
          <span>Starting Tempo</span>
          <input id="tempo-start" type="number" min="30" max="220" value="80" />
          <small>BPM</small>
        </label>

        <label class="field-group">
          <span>Tempo Increment</span>
          <input id="tempo-step" type="number" min="0" max="20" value="3" step="0.5" />
          <small>BPM / minute</small>
        </label>

        <label class="field-group full-width">
          <span>Main Beat Sound</span>
          <select id="main-sound">
            <option value="deep-pulse">Deep Pulse</option>
            <option value="sub-kick">Sub Kick</option>
            <option value="thud">Low Thud</option>
          </select>
        </label>

        <label class="field-group full-width">
          <span>Minute Marker Sound</span>
          <select id="marker-sound">
            <option value="bass-gong">Bass Gong</option>
            <option value="low-bell">Low Bell</option>
            <option value="sub-snap">Sub Snap</option>
          </select>
        </label>
      </div>
    </section>

    <section class="panel control-panel">
      <div class="beat-display">
        <div class="beat-card">
          <span class="label">Tempo</span>
          <strong id="tempo-display">80 BPM</strong>
        </div>
        <div class="beat-card">
          <span class="label">Minutes</span>
          <strong id="elapsed-minutes">0</strong>
        </div>
      </div>

      <div class="center-button">
        <button id="toggle-button" class="action-button action-start" type="button">Start</button>
      </div>

      <div class="status-bar">
        <span id="rhythm-status">Ready to start the pulse.</span>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
